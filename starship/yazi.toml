format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$lua\
$rust\
$time"""

add_newline = false
palette = 'onedark'

[directory]
style = 'bold fg:red'
format = '[$path ]($style)'
truncation_length = 2
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙 '
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '
'Desktop' = ' '
'Programming' = ' '
'~' = ' '

[time]
disabled = false
format = '[󱑆 $time]($style) '
style = 'fg:#756bb1 bold'
time_format = '%T'
utc_time_offset = '+9'
time_range = '00:00:00-23:59:59'

[os]
disabled = false
format = "[$symbol]($style) "
symbols.Ubuntu = ""
symbols.Windows = ""
symbols.Macos = ""
style = "#f7f7f7 bold"

[git_branch]
style = 'fg:green bold'
symbol = ' '
format = '[$symbol$branch ]($style)'

[git_status]
ahead = "↑${count} "
behind = "↓${count} "
diverged = "↕${ahead_count} ${behind_count}"
untracked = "?${count} "
modified = "!${count} "
conflicted = "≠${count} "
staged = "✓${count} "
stashed = "*${count} "
style = "bright-white"
format = """\
[$ahead_behind](bold green)\
[$stashed](bold green)\
[$behind_behind](bold red)\
[$diverged](bold yellow)\
[$conflicted](bold red)\
[$modified](bold blue)\
[$untracked](bold cyan)\
[$staged](bold green)\
"""

[palettes.onedark]
dark_blue='#61afef'
blue='#56b6c2'
red='#e06c75'
green='#98c379'
purple='#c678dd'
cyan='#56b6c2'
orange='#be5046'
yellow='#e5c07b'
gray='#828997'
white ='#abb2bf'
black='#2c323c'
