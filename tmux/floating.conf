# Floating tools
unbind -q y
unbind -q Y
unbind -q O
unbind -q -T floating b
unbind -q -T floating c
unbind -q -T floating d
unbind -q -T floating g
unbind -q -T floating o
unbind -q -T floating x
unbind -q -T floating y

bind f display-menu -M \
  -T " Floating " \
  -x C -y C \
  -s "fg=#c0caf5,bg=#1f2335" \
  -S "fg=#7dcfff,bg=#1f2335" \
  -H "fg=#1a1b26,bg=#7aa2f7,bold" \
  "Git          lazygit" g "display-popup -d '#{pane_current_path}' -w80% -h80% -T 'lazygit' -E lazygit" \
  "Docker       lazydocker" d "display-popup -d '#{pane_current_path}' -w80% -h80% -T 'lazydocker' -E lazydocker" \
  "Monitor      btop" b "display-popup -w80% -h80% -T 'btop' -E btop" \
  "" "" "" \
  "Codex        session root" x "run-shell '\
    ROOT=\"#{session_path}\"; \
    SESSION=\"codex-\$(printf \"%s\" \"\$ROOT\" | md5sum | cut -c1-8)\"; \
    tmux has-session -t \"\$SESSION\" 2>/dev/null || \
    tmux new-session -d -s \"\$SESSION\" -c \"\$ROOT\" \"codex --dangerously-bypass-approvals-and-sandbox\"; \
    tmux display-popup -d \"\$ROOT\" -w80% -h80% -T \"codex\" -E \"tmux attach-session -t \$SESSION\"'" \
  "Claude       session root" c "run-shell '\
    ROOT=\"#{session_path}\"; \
    SESSION=\"claude-\$(printf \"%s\" \"\$ROOT\" | md5sum | cut -c1-8)\"; \
    tmux has-session -t \"\$SESSION\" 2>/dev/null || \
    tmux new-session -d -s \"\$SESSION\" -c \"\$ROOT\" \"claude --dangerously-skip-permissions\"; \
    tmux display-popup -d \"\$ROOT\" -w80% -h80% -T \"claude\" -E \"tmux attach-session -t \$SESSION\"'" \
  "Claude       Obsidian vault" o "run-shell '\
    ROOT=\"\$OBSIDIAN_VAULT_DIR\"; \
    [ -n \"\$ROOT\" ] || ROOT=\"\$HOME/Desktop/Obsidian/Argus\"; \
    SESSION=\"claude-obsidian-\$(printf \"%s\" \"\$ROOT\" | md5sum | cut -c1-8)\"; \
    tmux has-session -t \"\$SESSION\" 2>/dev/null || \
    tmux new-session -d -s \"\$SESSION\" -c \"\$ROOT\" \"claude --dangerously-skip-permissions\"; \
    tmux display-popup -d \"\$ROOT\" -w80% -h80% -T \"claude: obsidian\" -E \"tmux attach-session -t \$SESSION\"'"
