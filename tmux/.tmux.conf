# set -g default-terminal "tmux-256color"
# 'tmux-256color'는 tmux에서 최적화된 256컬러 지원을 제공
# 최신 터미널 환경에서 정확한 색상 렌더링과 tmux 고유 기능 지원에 적합
# 하지만 일부 원격 서버나 터미널 에뮬레이터에서 제대로 인식되지 않을 수 있음

set -g default-terminal "xterm-256color"
# 'xterm-256color'는 가장 널리 지원되는 256컬러 터미널 타입
# 호환성이 높아 원격 서버 및 다양한 터미널 에뮬레이터에서 안정적으로 동작

set -ag terminal-overrides ",xterm-256color:RGB"
# 'terminal-overrides'는 특정 터미널에서 색상 지원을 추가로 활성화
# 여기서는 xterm-256color 환경에서 RGB 색상 지원을 보장

# 스크롤백 버퍼를 늘려 긴 로그와 테스트 출력을 더 오래 보존
set -g history-limit 100000

# pane/client 포커스 변경 이벤트를 TUI 애플리케이션에 전달
set -g focus-events on

#------------------------------------------------------------------------
# 키 매핑 및 단축키 설정
#------------------------------------------------------------------------
# tmux 명령어 실행 시 기본 prefix를 ctrl+b에서 ctrl+space로 변경
set -g prefix C-Space
unbind C-b
bind-key C-Space send-prefix

# 창 세로 분할 단축키를 prefix+%에서 prefix+|로 변경
unbind %
bind | split-window -h -c "#{pane_current_path}"

# 창 가로 분할 단축키를 prefix+"에서 prefix+-로 변경
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# 새 창을 현재 pane의 작업 디렉터리에서 열도록 설정
bind c new-window -c "#{pane_current_path}"

# .tmux.conf 수정 후 적용 명령어를 tmux source-file ~/.tmux.conf에서 prefix+r로 변경
unbind r
bind r source-file ~/.tmux.conf

# 창을 분할했을 때, 분할된 경계의 위치를 조정하는 단축키 (prefix + h, j, k, l)
bind j resize-pane -D 5 # 아래로 이동
bind k resize-pane -U 5 # 위로 이동
bind l resize-pane -R 5 # 오른쪽으로 이동
bind h resize-pane -L 5 # 왼쪽으로 이동

# 현재 pane을 전체 화면으로 전환하거나 원래대로 되돌리는 단축키 (prefix+m)
bind -r m resize-pane -Z

#------------------------------------------------------------------------
# 마우스 및 창 관리 설정
#------------------------------------------------------------------------
# 마우스 기능 활성화
set -g mouse on

# 창 번호를 1부터 시작하도록 설정
set -g base-index 1

# 창 번호를 자동으로 재정렬
set -g renumber-windows on

#------------------------------------------------------------------------
# vi 모드 및 복사 설정
#------------------------------------------------------------------------
# vi 모드에서 복사 모드 활성화
set-window-option -g mode-keys vi

# vi 복사 모드에서 텍스트 선택(v)과 복사(y) 단축키 설정
bind-key -T copy-mode-vi 'v' send -X begin-selection # 텍스트 선택 시작
bind-key -T copy-mode-vi 'y' send -X copy-selection  # 텍스트 복사

# 마우스 드래그로 선택 시 복사 모드에서 빠져나가지 않도록 설정
unbind -T copy-mode-vi MouseDragEnd1Pane

#------------------------------------------------------------------------
# Neovim 및 ESC 키 설정
#------------------------------------------------------------------------
# Neovim에서 ESC 키로 insert 모드 종료 시 지연시간 제거
set -sg escape-time 10

#------------------------------------------------------------------------
# 플러그인 및 테마 설정
#------------------------------------------------------------------------
# tmux plugin manager(tpm) 설정
set -g @plugin 'tmux-plugins/tpm'

# tmux plugin 리스트
set -g @plugin 'christoomey/vim-tmux-navigator' # vim-tmux 내비게이터
set -g @plugin 'tmux-plugins/tmux-resurrect' # 컴퓨터 재시작 후 tmux 세션 복원
set -g @plugin 'fabioluciano/tmux-powerkit' # PowerKit 상태바 프레임워크


# PowerKit Tokyo Night 설정
set -g @powerkit_theme 'tokyo-night'
set -g @powerkit_theme_variant 'storm'
# 오른쪽 상태 영역은 시간과 날씨만 남기되 같은 색 계열로 묶어 안정감 있게 렌더링.
set -g @powerkit_plugins 'datetime,weather'
set -g @powerkit_plugin_group_coloring 'true'
set -g @powerkit_plugin_group_colors '#3d59a1'

# 플러그인 : 날짜는 줄이고 시각 가독성을 우선.
set -g @powerkit_plugin_datetime_format '%m-%d %H:%M'
# 플러그인
set -g @powerkit_plugin_weather_icon_mode 'dynamic'
set -g @powerkit_plugin_weather_location "Seoul, South Korea"
set -g @powerkit_plugin_weather_format 'compact'

# 세션은 왼쪽, 윈도우 목록은 가운데, 플러그인은 오른쪽으로 배치.
set -g @powerkit_status_position 'bottom'
set -g @powerkit_status_justify 'centre'
set -g @powerkit_status_order 'session,windows,plugins'
set -g @powerkit_status_interval '5'
set -g @powerkit_theme_selector_key 'T'
set -g @powerkit_transparent 'true'

# PowerKit 공식 지원 separator 중 가장 각진 slantup 스타일만 사용.
set -g @powerkit_separator_style 'flame'
set -g @powerkit_edge_separator_style 'flame:all'
set -g @powerkit_initial_separator_style 'flame:all'
set -g @powerkit_elements_spacing 'true'
set -g @powerkit_icon_padding '2'
set -g @powerkit_window_index_style 'text'

# Pane Options
set -g @powerkit_pane_border_lines "single"
set -g @powerkit_pane_border_unified "false"
set -g @powerkit_active_pane_border_color "pane-border-active"
set -g @powerkit_inactive_pane_border_color "pane-border-inactive"

set -g @powerkit_pane_border_status "top"
set -g @powerkit_pane_border_status_bg "none"
set -g @powerkit_pane_border_format "{index}: {title}"

set -g @powerkit_pane_flash_enabled "false"
set -g @powerkit_pane_flash_color "statusbar-bg"
set -g @powerkit_pane_flash_duration "100"

# Window Options
set -g @powerkit_window_index_style "text"
set -g @powerkit_inactive_window_show_index "false"

# Session Options
set -g @powerkit_session_show_mode "true"


# tmux-resurrect 플러그인에서 pane 내용 캡쳐 활성화
set -g @resurrect-restore 'C-r'
set -g @resurrect-capture-pane-contents 'on'


#------------------------------------------------------------------------
# tmux plugin manager 초기화
#------------------------------------------------------------------------
# tmux plugin manager 초기화 (이 라인은 tmux.conf 맨 아래에 유지해야 함)
run '~/.tmux/plugins/tpm/tpm'
