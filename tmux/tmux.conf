set -g default-terminal "tmux-256color"
# 'tmux-256color'는 tmux에서 최적화된 256컬러 지원을 제공
# 최신 터미널 환경에서 정확한 색상 렌더링과 tmux 고유 기능 지원에 적합
# 하지만 일부 원격 서버나 터미널 에뮬레이터에서 제대로 인식되지 않을 수 있음

set -ag terminal-overrides ",xterm-256color:RGB"
# 'terminal-overrides'는 특정 터미널에서 색상 지원을 추가로 활성화
# 여기서는 xterm-256color 환경에서 RGB 색상 지원을 보장

# 스크롤백 버퍼를 늘려 긴 로그와 테스트 출력을 더 오래 보존
set -g history-limit 100000

# pane/client 포커스 변경 이벤트를 TUI 애플리케이션에 전달
set -g focus-events on

#------------------------------------------------------------------------
# 키 매핑 및 단축키 설정
#------------------------------------------------------------------------
# tmux 명령어 실행 시 기본 prefix를 ctrl+b에서 ctrl+a로 변경
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# 창 세로 분할 단축키를 prefix+|로 변경
unbind %
bind | split-window -h -c "#{pane_current_path}"

# 창 가로 분할 단축키를 prefix+-로 변경
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# 새 창을 현재 pane의 작업 디렉터리에서 열도록 설정
bind c new-window -c "#{pane_current_path}"

# tmux.conf 수정 후 prefix+r로 설정 다시 로드
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# 창을 분할했을 때, 분할된 경계의 위치를 조정하는 단축키 (prefix + h, j, k, l)
bind -r j resize-pane -D 5 # 아래로 이동
bind -r k resize-pane -U 5 # 위로 이동
bind -r l resize-pane -R 5 # 오른쪽으로 이동
bind -r h resize-pane -L 5 # 왼쪽으로 이동

# pane 이동 (alt+h/j/k/l, prefix 불필요)
# 윈도우 Alacritty는 ctrl+hjkl 키 겹침 문제로 alt+hjkl로 변환해 보내므로 M-hjkl도 이동으로 받아준다.
# vim pane이면 C-hjkl로 변환해 넘겨 nvim은 navigator 기본 매핑 하나로 처리한다 (ESC 시퀀스 모호성 회피).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n M-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n M-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n M-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n M-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# 현재 pane을 전체 화면으로 전환하거나 원래대로 되돌리는 단축키 (prefix+m)
bind m resize-pane -Z

# TUI for tmux options
bind C customize-mode -Z

# sesh session prompt
bind-key "K" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

source-file ~/.config/tmux/floating.conf
#------------------------------------------------------------------------
# 마우스 및 창 관리 설정
#------------------------------------------------------------------------
# 마우스 기능 활성화
set -g mouse on

# 창 번호를 1부터 시작하도록 설정
set -g base-index 1

# 창 번호를 자동으로 재정렬
set -g renumber-windows on

# for sesh
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

#------------------------------------------------------------------------
# 벨(알림) 설정
#------------------------------------------------------------------------
# 현재 세션에 연결된 모든 window의 벨에 반응 (기본값이지만 명시)
set -g bell-action any

set -g visual-bell off

# 벨이 울린 window 이름 옆에 ! 플래그 표시 (기본값이지만 명시)
set -g monitor-bell on

#------------------------------------------------------------------------
# vi 모드 및 복사 설정
#------------------------------------------------------------------------
# vi 모드에서 복사 모드 활성화
set-window-option -g mode-keys vi

# vi 복사 모드에서 텍스트 선택(v)과 복사(y) 단축키 설정
bind-key -T copy-mode-vi 'v' send -X begin-selection # 텍스트 선택 시작
bind-key -T copy-mode-vi 'y' send -X copy-selection  # 텍스트 복사

# 마우스 드래그로 선택 시 복사 모드에서 빠져나가지 않도록 설정
unbind -T copy-mode-vi MouseDragEnd1Pane

#------------------------------------------------------------------------
# Neovim 및 ESC 키 설정
#------------------------------------------------------------------------
# ESC로 시작하는 키 시퀀스 판별 대기 시간을 줄여 TUI 입력 지연을 낮춤
set -sg escape-time 10

#------------------------------------------------------------------------
# 플러그인 및 테마 설정
#------------------------------------------------------------------------
# tpack plugin manager 설정
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/" # default
set -g @tpack-install 'I'
set -g @tpack-update 'U'
set -g @tpack-clean 'M-u'
set -g @tpack-tui 'T'
set -g @tpack-color-primary '#7aa2f7'
set -g @tpack-color-secondary '#9ece6a'
set -g @tpack-color-accent '#e0af68'
set -g @tpack-color-error '#f7768e'
set -g @tpack-color-muted '#565f89'
set -g @tpack-color-text '#c0caf5'

# tmux plugin 리스트
set -g @plugin 'christoomey/vim-tmux-navigator' # vim-tmux 내비게이터
set -g @plugin 'tmux-plugins/tmux-resurrect' # 컴퓨터 재시작 후 tmux 세션 복원
set -g @plugin 'tmux-plugins/tmux-open' # copy-mode에서 선택한 URL/파일/검색어를 기본 앱 또는 에디터로 열기
set -g @plugin 'fabioluciano/tmux-powerkit' # PowerKit 상태바 프레임워크

# tmux-open 기본 설정
# copy-mode에서 o: 선택한 URL/파일을 OS 기본 앱으로 열기(macOS open, Linux xdg-open)
set -g @open 'o'
# copy-mode에서 C-o: 선택한 파일을 $EDITOR 또는 @open-editor-command로 열기
set -g @open-editor 'C-o'
# copy-mode에서 S: 선택한 텍스트를 Google 검색으로 열기
set -g @open-S 'https://www.google.com/search?q='

# PowerKit Nord 설정
set -g @powerkit_theme 'custom'
set -g @powerkit_theme_variant 'nord-contrast'
set -g @powerkit_custom_theme_path '~/.config/tmux/powerkit-nord-contrast.sh'
# 오른쪽 상태 영역은 조건부 정보와 시간/날씨를 그룹으로 묶어 안정감 있게 렌더링.
set -g @powerkit_plugins 'group(ssh,vpn,git),group(datetime,weather)'
set -g @powerkit_plugin_group_coloring 'true'
set -g @powerkit_plugin_group_colors '#5e81ac,#4c566a,#3b4252'

# 플러그인 : 날짜는 줄이고 시각 가독성을 우선.
set -g @powerkit_plugin_datetime_format '%m-%d %H:%M'
set -g @powerkit_plugin_weather_icon_mode 'dynamic'
set -g @powerkit_plugin_weather_location "Seoul, South Korea"
set -g @powerkit_plugin_weather_format 'compact'

# 플러그인 : 평소에는 조용하게 두고, 의미 있는 상태 변화만 표시.
set -g @powerkit_plugin_ssh_format 'indicator'
set -g @powerkit_plugin_ssh_show_when_local 'false'
set -g @powerkit_plugin_vpn_format 'provider'
set -g @powerkit_plugin_vpn_max_length '12'
set -g @powerkit_plugin_vpn_detect_private_relay 'true'

# 세션은 왼쪽, 윈도우 목록은 가운데, 플러그인은 오른쪽으로 배치.
set -g @powerkit_status_position 'bottom'
set -g @powerkit_status_justify 'centre'
set -g @powerkit_status_order 'session,windows,plugins'
set -g @powerkit_status_interval '5'
set -g @powerkit_theme_selector_key 'P'
set -g @powerkit_transparent 'true'

# Ghostty background-opacity-cells=false에서는 Powerline glyph와 segment 배경이 함께 안정적으로 보인다.
set -g @powerkit_separator_style 'trapezoid'
set -g @powerkit_edge_separator_style 'trapezoid:all'
set -g @powerkit_initial_separator_style 'trapezoid'
set -g @powerkit_elements_spacing 'plugins'
set -g @powerkit_icon_padding '3'

# Pane Options
set -g @powerkit_pane_border_lines "double"
set -g @powerkit_pane_border_unified "false"
set -g @powerkit_active_pane_border_color "pane-border-active"
set -g @powerkit_inactive_pane_border_color "pane-border-inactive"

set -g @powerkit_pane_border_status "top"
set -g @powerkit_pane_border_status_bg ""
set -g @powerkit_pane_border_format "pane: {index} | {title} | {command}"

set -g @powerkit_pane_flash_enabled "false"
set -g @powerkit_pane_flash_color "statusbar-bg"
set -g @powerkit_pane_flash_duration "100"

# Window Options
set -g @powerkit_window_index_style "text"
set -g @powerkit_inactive_window_show_index "true"

# Session Options
set -g @powerkit_session_show_mode "true"
set -g @powerkit_session_copy_mode_color "session-copy-bg"

# tmux-resurrect 플러그인에서 pane 내용 캡쳐 활성화
set -g @resurrect-restore 'C-r'
set -g @resurrect-capture-pane-contents 'on'


#------------------------------------------------------------------------
# tpack plugin manager 초기화: tmp과 달리 마지막에 있을 필요 없음
#------------------------------------------------------------------------
run 'tpack init'
